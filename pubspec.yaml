name: solo_leveling_system
description: Personal System Builder - Solo Leveling Style
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Animations
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  percent_indicator: ^4.2.4

  # Image & Media
  image_picker: ^1.1.3
  cached_network_image: ^3.3.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  confetti: ^0.7.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/solo_system_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
